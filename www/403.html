<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 403 Forbidden</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container error-container">
        <div class="emoji-header">🔒🚫⚠️</div>
        <div class="error-code">403</div>
        <h1>Forbidden</h1>
        <div class="error-msg">🙅 You don't have permission to access this resource.</div>
        <p>Possible reasons:</p>
        <ul style="display: inline-block; text-align: left; margin: 15px auto;">
            <li>File permissions are restricted</li>
            <li>Directory listing is disabled</li>
            <li>Access to this path is denied by server configuration</li>
        </ul>
        <div class="button-group" style="justify-content: center; margin-top: 25px;">
            <a href="index.html" class="btn">🏠 Return to Homepage</a>
        </div>
        <div class="footer" style="margin-top: 40px;">
            📡 Comp 2322 · HTTP 403 Forbidden
        </div>
    </div>
</body>
</html>
